<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffecd2, #fcb69f);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 40px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
  text-align: center;
}

h2 {
  color: #7a1414;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  background: #7a1414;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #5c0f0f;
}

a {
  display: block;
  margin-top: 15px;
  text-decoration: none;
  color: #7a1414;
}
</style>

</head>
<body>

<div class="container">
  <h2>Login</h2>

  <input type="email" placeholder="E-mail">
  <input type="password" placeholder="Senha">

  <button>Entrar</button>

  <a href="cadastro.html">Não tem conta? Cadastre-se</a>
</div>

</body>
</html>
